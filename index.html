<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>貨幣面額生成器 | HKDC & MOP 專業版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* 主容器 */
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            align-items: stretch;
        }

        /* 卡片樣式 - 更現代 */
        .currency-card {
            flex: 1;
            min-width: 360px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .currency-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 0.35);
        }

        /* 頭部漸變 */
        .card-header {
            padding: 1.5rem 1.8rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .card-header::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hkdc-header {
            background: linear-gradient(135deg, #1e3c4c 0%, #0f2c3a 100%);
        }

        .mop-header {
            background: linear-gradient(135deg, #1f5e4a 0%, #0f3e2f 100%);
        }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .card-header h2 small {
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            letter-spacing: normal;
        }

        .card-header p {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* 總額進度條區域 */
        .total-progress {
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            padding: 0.2rem;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.85);
            border-radius: 30px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 0.35rem;
            opacity: 0.8;
        }

        /* 表格區域 */
        .table-wrapper {
            padding: 1.2rem 1.5rem 0.8rem 1.5rem;
            flex: 1;
        }

        .denom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .denom-table th {
            text-align: left;
            padding: 0.75rem 0.5rem 0.75rem 0;
            font-weight: 600;
            color: #2c3e4f;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .denom-table th:last-child {
            text-align: center;
            padding-right: 0;
        }

        .denom-table td {
            padding: 0.8rem 0.5rem 0.8rem 0;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }

        .denom-table tr:last-child td {
            border-bottom: none;
        }

        .denom-value {
            font-weight: 650;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #1e2a3a;
        }

        .quantity-cell {
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: #0f5b7a;
            background: #f8fafd;
            padding: 0.4rem 0.2rem;
            border-radius: 20px;
            width: 70px;
        }

        .min-hint {
            font-size: 0.65rem;
            font-weight: normal;
            background: #eef2ff;
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
            margin-left: 0.5rem;
            color: #1f5e8e;
            white-space: nowrap;
        }

        .fixed-zero {
            font-size: 0.6rem;
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
            margin-left: 0.4rem;
            white-space: nowrap;
        }

        /* 總計行 */
        .total-row {
            background: #f1f5f9;
            border-radius: 16px;
        }
        .total-row td {
            padding: 1rem 0.5rem;
            font-weight: 700;
            border-top: 2px solid #cbd5e1;
            border-bottom: none;
        }
        .total-label {
            text-align: right;
            font-weight: 700;
            color: #1e293b;
        }
        .total-amount {
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            background: #e6f9ed;
            border-radius: 40px;
            color: #0c6b4a;
        }

        /* 按鈕區域 */
        .button-area {
            padding: 0.5rem 1.8rem 2rem 1.8rem;
            text-align: center;
        }

        .random-btn {
            background: linear-gradient(105deg, #2b3b4c, #1d2e3c);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 260px;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            backdrop-filter: blur(4px);
        }

        .random-btn:hover {
            background: linear-gradient(105deg, #1f2e3c, #11212e);
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .random-btn:active {
            transform: scale(0.96);
        }

        /* 註腳 */
        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #5b6e8c;
        }

        /* 回應式 */
        @media (max-width: 780px) {
            body {
                padding: 1rem;
            }
            .card-header h2 {
                font-size: 1.4rem;
            }
            .denom-table th, .denom-table td {
                font-size: 0.8rem;
                padding: 0.6rem 0.3rem;
            }
            .quantity-cell {
                width: auto;
                min-width: 55px;
            }
            .random-btn {
                max-width: 100%;
            }
        }

        /* 微動畫 */
        @keyframes gentlePulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .card-header, .total-amount {
            transition: all 0.2s;
        }
        .refresh-icon {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .random-btn:hover .refresh-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- HKDC 卡片 -->
    <div class="currency-card" id="hkdc-card">
        <div class="card-header hkdc-header">
            <h2>
                🇭🇰 HKDC 
                <small>HKDC面額</small>
            </h2>
            <div class="total-progress">
                <div class="progress-bar" id="hkdc-progress"></div>
                <div class="range-labels">
                    <span>1,000k</span>
                    <span>2,000k</span>
                    <span>3,000k</span>
                </div>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="denom-table" id="hkdc-table">
                <thead>
                    <tr><th>面值 (HKD)</th><th style="text-align:center">數量</th></tr>
                </thead>
                <tbody id="hkdc-tbody"></tbody>
                <tfoot id="hkdc-tfoot"></tfoot>
            </table>
        </div>
        <div class="button-area">
            <button class="random-btn" id="random-hkdc-btn">
                <span class="refresh-icon">🔄</span> 隨機生成 HKDC
            </button>
        </div>
    </div>

    <!-- MOP 卡片 -->
    <div class="currency-card" id="mop-card">
        <div class="card-header mop-header">
            <h2>
                🇲🇴 MOP 
                <small>MOP面額</small>
            </h2>
            <div class="total-progress">
                <div class="progress-bar" id="mop-progress"></div>
                <div class="range-labels">
                    <span>800k</span>
                    <span>1,000k</span>
                    <span>1,200k</span>
                </div>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="denom-table" id="mop-table">
                <thead>
                    <tr><th>面值 (MOP)</th><th style="text-align:center">數量</th></tr>
                </thead>
                <tbody id="mop-tbody"></tbody>
                <tfoot id="mop-tfoot"></tfoot>
            </table>
        </div>
        <div class="button-area">
            <button class="random-btn" id="random-mop-btn">
                <span class="refresh-icon">🔄</span> 隨機生成 MOP
            </button>
        </div>
    </div>
</div>
<footer>⚡ 每次點擊均自動滿足面額上限、最低數量及總額區間要求 | 資料獨立隨機</footer>

<script>
    // ======================= 面值定義 (完全按照圖片順序) =======================
    const DENOMS = [100000, 50000, 10000, 5000, 1000, 500, 100, 50, 10, 5];
    
    // ---------- 上限配置 ----------
    const HKDC_MAX_LIMITS = {
        100000: 30,
        50000:  40,
        10000:  300,
        5000:   100,
        1000:   300,
        500:    240,
        100:    300,
        50:     160,
        10:     160,
        5:      100
    };
    
    // ---------- 最低數量保障 ----------
    const MIN_REQUIREMENTS = {
        10000: 51,
        5000:  51,
        1000:  101,
        500:   51,
        100:   61,
        50:    41,
        10:    21,
        5:     21
    };
    
    const MOP_MAX_LIMITS = { ...HKDC_MAX_LIMITS };
    
    // 總額區間
    const HKDC_MIN = 1000000;
    const HKDC_MAX = 3000000;
    const MOP_MIN  = 800000;
    const MOP_MAX  = 1200000;
    
    // 輔助函數
    function randomInRange(min, max) {
        if (min > max) [min, max] = [max, min];
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    
    function getHKDCQuantity(denom) {
        const maxLimit = HKDC_MAX_LIMITS[denom];
        if (maxLimit === undefined) return 0;
        if (MIN_REQUIREMENTS.hasOwnProperty(denom)) {
            const minReq = MIN_REQUIREMENTS[denom];
            const low = Math.min(minReq, maxLimit);
            return randomInRange(low, maxLimit);
        }
        return randomInRange(0, maxLimit);
    }
    
    function getMOPQuantity(denom) {
        if (denom === 100000 || denom === 50000) return 0;
        const maxLimit = MOP_MAX_LIMITS[denom];
        if (maxLimit === undefined) return 0;
        if (MIN_REQUIREMENTS.hasOwnProperty(denom)) {
            const minReq = MIN_REQUIREMENTS[denom];
            const low = Math.min(minReq, maxLimit);
            return randomInRange(low, maxLimit);
        }
        return randomInRange(0, maxLimit);
    }
    
    function computeTotal(quantities) {
        let total = 0;
        for (let i = 0; i < DENOMS.length; i++) {
            total += DENOMS[i] * quantities[i];
        }
        return total;
    }
    
    function generateHKDC() {
        const MAX_ATTEMPTS = 400;
        let attempts = 0;
        let quantities, total;
        do {
            quantities = DENOMS.map(d => getHKDCQuantity(d));
            total = computeTotal(quantities);
            attempts++;
            if (attempts >= MAX_ATTEMPTS) {
                console.warn("HKDC 達最大重試次數");
                break;
            }
        } while (total <= HKDC_MIN || total > HKDC_MAX);
        return quantities;
    }
    
    function generateMOP() {
        const MAX_ATTEMPTS = 400;
        let attempts = 0;
        let quantities, total;
        do {
            quantities = DENOMS.map(d => getMOPQuantity(d));
            total = computeTotal(quantities);
            attempts++;
            if (attempts >= MAX_ATTEMPTS) {
                console.warn("MOP 達最大重試次數");
                break;
            }
        } while (total <= MOP_MIN || total > MOP_MAX);
        return quantities;
    }
    
    // 格式化
    function formatMoney(val, sym) {
        return sym + val.toLocaleString('en-US');
    }
    function formatDenom(v) {
        return v.toLocaleString('en-US');
    }
    
    // DOM 元素
    let hkdcQtys = [];
    let mopQtys = [];
    
    function updateProgress(currency, total, minVal, maxVal) {
        const barId = currency === 'hkdc' ? 'hkdc-progress' : 'mop-progress';
        const bar = document.getElementById(barId);
        if (!bar) return;
        let percent = ((total - minVal) / (maxVal - minVal)) * 100;
        percent = Math.min(100, Math.max(0, percent));
        bar.style.width = `${percent}%`;
    }
    
    function renderHKDC() {
        const tbody = document.getElementById('hkdc-tbody');
        const tfoot = document.getElementById('hkdc-tfoot');
        if (!tbody) return;
        let html = '';
        for (let i = 0; i < DENOMS.length; i++) {
            const denom = DENOMS[i];
            const qty = hkdcQtys[i];
            let badge = '';
            if (MIN_REQUIREMENTS[denom]) badge = `<span class="min-hint">≥${MIN_REQUIREMENTS[denom]}</span>`;
            html += `<tr>
                        <td class="denom-value">HKD ${formatDenom(denom)}</td>
                        <td class="quantity-cell">${qty} ${badge}</td>
                     </tr>`;
        }
        tbody.innerHTML = html;
        const total = computeTotal(hkdcQtys);
        updateProgress('hkdc', total, HKDC_MIN, HKDC_MAX);
        tfoot.innerHTML = `<tr class="total-row">
                            <td class="total-label"><strong>💰 合計金額</strong></td>
                            <td class="total-amount"><strong>${formatMoney(total, 'HKD ')}</strong></td>
                           </tr>`;
    }
    
    function renderMOP() {
        const tbody = document.getElementById('mop-tbody');
        const tfoot = document.getElementById('mop-tfoot');
        if (!tbody) return;
        let html = '';
        for (let i = 0; i < DENOMS.length; i++) {
            const denom = DENOMS[i];
            const qty = mopQtys[i];
            let badge = '';
            if (MIN_REQUIREMENTS[denom]) badge = `<span class="min-hint">≥${MIN_REQUIREMENTS[denom]}</span>`;
            let fixed = (denom === 100000 || denom === 50000) ? '<span class="fixed-zero">固定0</span>' : '';
            html += `<tr>
                        <td class="denom-value">MOP ${formatDenom(denom)}</td>
                        <td class="quantity-cell">${qty} ${badge} ${fixed}</td>
                     </tr>`;
        }
        tbody.innerHTML = html;
        const total = computeTotal(mopQtys);
        updateProgress('mop', total, MOP_MIN, MOP_MAX);
        tfoot.innerHTML = `<tr class="total-row">
                            <td class="total-label"><strong>💰 合計金額</strong></td>
                            <td class="total-amount"><strong>${formatMoney(total, 'MOP ')}</strong></td>
                           </tr>`;
    }
    
    function randomizeHKDC() {
        hkdcQtys = generateHKDC();
        renderHKDC();
    }
    
    function randomizeMOP() {
        mopQtys = generateMOP();
        renderMOP();
    }
    
    // 初始化
    function init() {
        hkdcQtys = generateHKDC();
        mopQtys = generateMOP();
        renderHKDC();
        renderMOP();
        
        const hkBtn = document.getElementById('random-hkdc-btn');
        const mBtn = document.getElementById('random-mop-btn');
        if (hkBtn) {
            const newHk = hkBtn.cloneNode(true);
            hkBtn.parentNode.replaceChild(newHk, hkBtn);
            newHk.addEventListener('click', (e) => { e.preventDefault(); randomizeHKDC(); });
        }
        if (mBtn) {
            const newM = mBtn.cloneNode(true);
            mBtn.parentNode.replaceChild(newM, mBtn);
            newM.addEventListener('click', (e) => { e.preventDefault(); randomizeMOP(); });
        }
        document.getElementById('random-hkdc-btn')?.addEventListener('click', randomizeHKDC);
        document.getElementById('random-mop-btn')?.addEventListener('click', randomizeMOP);
    }
    
    init();
    window.addEventListener('load', () => {
        renderHKDC();
        renderMOP();
    });
</script>
</body>
</html>
